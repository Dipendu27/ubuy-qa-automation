name: Nightly Smoke Suite

on:
  schedule:
    # Run nightly at 2:00 AM IST (20:30 UTC previous day) to avoid peak traffic
    - cron: '30 20 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run (p0, p1, p2, or all)'
        required: false
        default: 'p0'

jobs:
  test:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      BASE_URL: ${{ secrets.BASE_URL || 'https://www.ubuy.co.in' }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      CI: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers & OS Dependencies
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests with WAF Retry Mitigation (Headed via xvfb)
        run: |
          run_suite() {
            if [ "${{ github.event.inputs.test_suite }}" == "all" ]; then
              xvfb-run npx playwright test --project=chromium-desktop
            elif [ -n "${{ github.event.inputs.test_suite }}" ]; then
              xvfb-run npx playwright test tests/${{ github.event.inputs.test_suite }}-* --project=chromium-desktop
            else
              xvfb-run npx playwright test tests/p0-critical-path/ --project=chromium-desktop
            fi
          }
          # Bounded retry-with-backoff mitigation for Cloudflare WAF challenges on GitHub-hosted IPs (§4 Task 7b)
          n=0
          until [ $n -ge 3 ]
          do
            run_suite && break
            n=$((n+1))
            if [ $n -lt 3 ]; then
              sleep_time=$((n * 30))
              echo "::warning::Test execution failed (potential Cloudflare WAF challenge). Retrying in ${sleep_time}s (attempt $n/2)..."
              sleep $sleep_time
            else
              echo "::error::Suite failed after $n attempts. Note: GitHub-hosted runners have elevated Cloudflare WAF challenge rates; a residential/corporate self-hosted runner is recommended."
              exit 1
            fi
          done

      - name: Upload Test Results & Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            reports/html/
            test-results/
          retention-days: 14

      - name: Send Failure Notification (§4 Task 4)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"🚨 *Nightly Smoke Suite Failed* against $BASE_URL\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" "$SLACK_WEBHOOK_URL"
          else
            echo "::warning::SLACK_WEBHOOK_URL secret not set. Please add SLACK_WEBHOOK_URL to GitHub Actions repo secrets to enable automated failure alerts."
          fi

