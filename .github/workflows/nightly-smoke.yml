name: Nightly Smoke Suite

on:
  schedule:
    # Run nightly at 2:00 AM IST (20:30 UTC previous day) to avoid peak traffic
    - cron: '30 20 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run (p0, p1, p2, or all)'
        required: false
        default: 'p0'

jobs:
  test:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      BASE_URL: ${{ secrets.BASE_URL || 'https://www.ubuy.co.in' }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      CI: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers & OS Dependencies
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests (Headed via xvfb per §5.1 / §8.4)
        run: |
          if [ "${{ github.event.inputs.test_suite }}" == "all" ]; then
            xvfb-run npx playwright test --project=chromium-desktop
          elif [ -n "${{ github.event.inputs.test_suite }}" ]; then
            xvfb-run npx playwright test tests/${{ github.event.inputs.test_suite }}-* --project=chromium-desktop
          else
            xvfb-run npx playwright test tests/p0-critical-path/ --project=chromium-desktop
          fi

      - name: Upload Test Results & Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            reports/html/
            test-results/
          retention-days: 14
